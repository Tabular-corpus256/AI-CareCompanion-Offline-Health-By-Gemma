### Final Safety Rules
- Never allow an athlete with concussion to return to play on the same day – risk of second impact syndrome (catastrophic brain swelling).
- For stress fractures at high‑risk sites (femoral neck, navicular, anterior tibia), refer urgently for orthopaedic evaluation; delayed healing or non‑union can occur.
- In acute muscle strains, avoid aggressive stretching early (delays healing). Use gentle isometric loading.
- Educate athletes on anti‑doping rules; supplement contamination is real – use certified products only.
- In heat illness, exertional heat stroke is a medical emergency – cold water immersion is the most effective treatment; do not wait for core temperature to come down passively.