### Final Safety Rules
- Infertility treatment should not be delayed for couples with female age >35; expedite evaluation and treatment.
- Gonadotropin therapy carries risk of OHSS and multiple pregnancy; must be monitored by experienced clinician.
- Single embryo transfer is strongly recommended for good prognosis patients to reduce multiple pregnancy risks.
- For patients under 35 with unexplained infertility, up to 6 cycles of OI+IUI before moving to IVF is reasonable.
- Genetic carrier screening and counselling recommended before proceeding with PGT or donor gametes.
- Fertility preservation for cancer patients must be done urgently before starting gonadotoxic therapy (can be done in 10‑14 days delay – safety of delay depends on cancer type and oncologist approval).