### Fitness‑for‑Duty – Examples of Restrictions

| Condition | Job role | Restriction / Accommodation |
|-----------|----------|-----------------------------|
| Seizure disorder (uncontrolled) | Commercial driver | Not fit for duty; may need seizure‑free period (e.g., 6‑12 months) on medication before return. |
| Severe sleep apnoea (untreated) | Pilot, train operator | Not fit until effective CPAP (compliance documented). |
| Post‑MI / stent | Firefighter | After clearance by cardiology, can return with restricted duty (no heavy exertion) initially, then full after functional testing. |
| Fractured wrist (healing) | Construction worker | Light duty (no lifting >5 kg, push/pull limited). |
| Depression / anxiety (moderate) | Any safety‑sensitive | May continue work if treatment adherent, no acute impairment; if suicidal ideation, remove from safety‑sensitive duties. |
| Pregnancy | Laboratory worker (teratogens) | Modify exposure limits, provide fit‑tested respirator (N95). Not automatically unfit. |
| Low back pain (acute) | Warehouse lifting | Light duty (sedentary tasks, no bending/lifting). |

### Common Work‑Related Illnesses – Evaluation

**Noise‑induced hearing loss (NIHL)** :
- History: prolonged exposure to noise >85 dBA (e.g., manufacturing, construction, airport, music). Often bilateral, high‑frequency notch (4000‑6000 Hz). Progression after removal only if age‑related.
- Evaluation: audiometry (baseline, annual, if threshold shift). Referral to audiology for confirmation.
- Prevention: engineering controls (enclosures, silencers), administrative (job rotation), hearing protection (NRR).

**Carpal tunnel syndrome (CTS)** – Occupational risk factors: repetitive wrist flexion/extension, forceful grip, vibration exposure (chainsaw, jackhammer), assembly line work, meatpacking, computer use (but lower risk). Diagnosis: nerve conduction studies. Treatment: splints, ergonomic modification, steroid injection, surgery if refractory.

**Occupational asthma** :
- Work‑related cough, wheeze, chest tightness; improvement on days off or holidays (latency period). See specific sensitizer (isocyanates, flour dust, wood dust, latex, aldehydes).
- Objective: serial peak expiratory flow (every 2h for 2 weeks at work and away), methacholine challenge, specific IgE.
- Management: remove from exposure (sometimes permanent), respiratory protection (full‑face air‑purifying respirator), pharmacological treatment.

**Hand‑arm vibration syndrome (HAVS)** – Vibration white finger, sensorineural symptoms. Exposure: chainsaws, jackhammers, grinders, impact wrenches. Staging: intermittent blanching, sensory loss, muscle weakness. Prevention: anti‑vibration tools, job rotation, warm clothing, smoking cessation.

**Occupational dermatitis** – Irritant (most common, wet work, solvents) vs allergic (latex, epoxy, chromium, nickel). Patch testing. Remove from exposure, substitution, barrier cream, moisturisers.

**Work‑related low back pain** – Risk factors: heavy lifting (>25 kg), frequent bending, twisting, vibration (truck drivers). Assess for disc herniation, sciatica. Conservative: activity modification, ergonomic improvements (lift tables, team lifting). No prolonged bed rest.

**Needlestick injury** – Bloodborne pathogen exposure. Immediate: wash wound, report to supervisor. Assess HIV, HBV, HCV status of source. PEP (within 72h) for HIV (consult infectious disease). Vaccination status (HBV). Document, test worker at baseline, 6 weeks, 3 months, 6 months.

### Respirator Medical Clearance – Key Questions

- Do you have heart disease, high blood pressure, or previous heart attack?
- Do you have lung disease (COPD, asthma, emphysema)?
- Do you have diabetes, seizure disorder, or other condition that might affect ability to work safely?
- Are you currently taking any medications (especially beta‑blockers, sedatives)?
- Physical ability to lift, carry, and wear respirator (especially SCBA, which can weigh >20 kg).
- Pulmonary function test (FEV1, FVC) – contraindicate if FEV1 <30% predicted or severe obstruction.

### Example Interaction (Carpal Tunnel Syndrome – Office Worker)

**User**: “34‑year‑old data entry clerk, 8h/day on keyboard, complains of numbness in thumb and index fingers, worse at night, relieved by shaking hands. No trauma.”
**Assistant**:
[OCCUPATION / JOB TITLE: Data entry clerk, computer use 8h/day]
[PRIMARY CONCERN: Suspected carpal tunnel syndrome (CTS)]
[RED FLAGS: none (no weakness, no muscle atrophy)]
[URGENCY: low (but treat to prevent progression)]
[ACTION: work restrictions: limit repetitive typing; breaks every 30 min. Provide ergonomic adjustments.]
[JOB ANALYSIS: Repetitive wrist flexion/extension, fixed posture. Keyboarding >10,000 keystrokes/day.]
[WORK‑RELATEDNESS: Probable – occupational risk factor (high repetition, prolonged keyboard use).]
[MANAGEMENT PLAN:]
- **Medical**: wrist splint at night (neutral position) for 4‑6 weeks. NSAIDs (ibuprofen) for pain. If no improvement, nerve conduction study; consider corticosteroid injection.
- **Work restrictions**: no >2h of continuous typing; take 5‑10 min rest every hour. Perform wrist stretching.
- **Ergonomic interventions**: ergonomic split keyboard, vertical mouse, wrist rest (but wrists should remain neutral, not bent up). Adjust chair height to forearms parallel to floor.
- **Workstation evaluation** by occupational therapist.
- **Report**: if persistent, file workers’ compensation claim (occupational disease).
[REFERRAL CRITERIA:] To hand surgery if severe symptoms (thenar muscle atrophy) or failed conservative treatment.
[DANGER SIGNS: Persistent weakness, loss of dexterity – urgent referral.]
[FOLLOW-UP: Reassess in 4 weeks. If no improvement, refer for electrodiagnostic studies.]

### Example Interaction (Fitness‑for‑Duty – Commercial Driver with Sleep Apnoea)

**User**: “55‑year‑old truck driver, BMI 34, snoring, daytime sleepiness (Epworth 14). No diagnosed sleep apnoea. DOT physical required.”
**Assistant**:
[OCCUPATION / JOB TITLE: Commercial motor vehicle driver (interstate)]
[PRIMARY CONCERN: Sleep apnoea screening – risk for excessive daytime sleepiness]
[RED FLAGS: Positive OSA screening; risk of microsleeps while driving]
[URGENCY: medium – not fit for duty until evaluation and treatment]
[ACTION: Temporary restriction from driving pending sleep study and effective treatment]
[JOB ANALYSIS: 10h driving/day; safety‑sensitive role; need alertness and rapid reaction]
[MANAGEMENT PLAN:]
- **Require** home sleep apnea testing (HSAT) or in‑lab polysomnogram.
- If AHI ≥5 with symptoms, or AHI ≥15 without symptoms, diagnosis of OSA.
- Fit for duty only after effective treatment (CPAP with >4h/night for 70% of nights, and documented compliance for 2 weeks). Must submit CPAP download.
- Also must not have excessive sleepiness during driving (if treated, usually qualifies).
- Annual re‑certification required.
[REFERRAL CRITERIA:] Sleep medicine specialist for CPAP titration and management.
[DANGER SIGNS: Any report of falling asleep while driving – immediate removal from duty.]
[FOLLOW-UP: After CPAP compliance, fitness certificate completed; DOT medical examiner’s certificate renewed for 1 year (instead of 2).]

