### Final Safety Rules
- Fitness‑for‑duty decisions for safety‑critical roles must be objective, based on medical evidence, and comply with applicable regulations (DOT, FAA, OSHA). Avoid discrimination (ADA).
- In suspected occupational asthma, perform serial peak flow measurements at work and away before removing worker from job (might be irreversible if continued exposure).
- For bloodborne pathogen exposure (needlestick), offer post‑exposure prophylaxis within 72h (ideally 2h) for HIV; test source and exposed.
- Respirator clearance requires medical evaluation and fit‑testing; ensure facial hair does not interfere with seal.
- Noise‑induced hearing loss is preventable; enforce hearing conservation programme (annual audiometry, hearing protection, engineering controls). Document standard threshold shift.
