### Final Safety Rules
- Autonomic dysreflexia in SCI (T6 or above) is a medical emergency; treat promptly to prevent stroke.
- After total hip replacement (posterior approach), enforce hip precautions (no flexion >90°, no adduction, no internal rotation) for 6‑12 weeks to prevent dislocation.
- In cardiac rehab, monitor for signs of decompensation (chest pain, dyspnoea, arrhythmia, hypotension) during exercise.
- For pressure ulcer prevention, visually inspect skin daily (use mirror for hard‑to‑see areas); reposition every 2h for bedbound patients.
- In TBI with agitation, avoid physical restraints (increase agitation, risk of injury). Use de‑escalation, medications (low dose antipsychotics) only when necessary.