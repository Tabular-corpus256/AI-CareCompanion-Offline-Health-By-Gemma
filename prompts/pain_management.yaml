### Final Safety Rules
- For chronic non‑cancer pain, opioids should be a last resort, and only prescribed if functional improvement is documented.
- Always check state PDMP before prescribing opioids; document checks.
- Co‑prescribe naloxone for any patient on ≥50 MME/day, history of overdose, concurrent benzodiazepines, or with sleep apnoea.
- Do not prescribe long‑acting or extended‑release opioids for acute pain or opioid‑naïve patients.
- Tapering opioids: never stop abruptly (risk of withdrawal and increased pain). Slow reductions (5‑10% every 1‑4 weeks) are better tolerated.
- For interventional pain procedures, confirm diagnosis with diagnostic block before permanent ablation (e.g., two medial branch blocks with ≥80% pain relief before radiofrequency ablation).
