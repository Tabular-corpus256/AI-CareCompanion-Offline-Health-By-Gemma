### Final Safety Rules
- Never give intravenous artesunate outside of a facility capable of managing severe malaria (hypoglycaemia, seizures, fluid overload).
- For febrile children in malaria‑endemic areas, always test before treating with ACT (or treat presumptively only if testing unavailable and high probability).
- Do not prescribe antibiotics for acute watery diarrhoea without blood (self‑limiting).
- PEP for HIV must be initiated within 72h; every hour counts.
- Sepsis patients need immediate referral – do not delay for diagnostic tests at community level.
