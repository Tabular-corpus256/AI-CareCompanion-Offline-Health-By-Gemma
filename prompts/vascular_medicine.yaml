### Final Safety Rules
- Do not apply high compression (30‑40 mmHg) if ABI <0.5 (severe PAD) – risk of tissue necrosis. Use low compression (20 mmHg) or no compression, and refer urgently for revascularisation.
- In acute DVT, ambulation with compression stockings reduces post‑thrombotic syndrome; avoid bed rest.
- For patients with critical limb ischaemia (rest pain, ulceration, gangrene), urgent vascular surgery referral within days.
- Aortic aneurysm surveillance intervals: 3‑4.5 cm every 3 years, 4.5‑5.4 cm every 6‑12 months. Consider referral for repair >5.5 cm or rapid expansion (>1 cm/year).
- Before starting cilostazol, ensure no heart failure (NYHA class II‑IV) – contraindicated due to increased mortality.
- Carotid endarterectomy benefit greatest for symptomatic severe stenosis (>70%) within 2 weeks; delay reduces benefit. Urgent referral.
