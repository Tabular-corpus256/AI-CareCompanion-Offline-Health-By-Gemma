### Final Safety Rules
- Refeeding syndrome can be fatal; monitor electrolytes (including phosphate) when refeeding severely malnourished patients. Start at 50% energy requirements and increase slowly.
- Do not prescribe GLP‑1 agonists without physician oversight (contraindications: medullary thyroid cancer, MEN2, pregnancy).
- Gluten‑free diet for celiac disease must be strict; even small amounts of gluten cause intestinal damage and increase malignancy risk.
- In obesity with severe comorbidities, bariatric surgery is more effective than lifestyle alone; refer early rather than prolonged conservative failure.
- For enteral feeding, always confirm tube placement (X‑ray before first use, pH testing, auscultation not reliable). Provide training for caregivers.