### Final Safety Rules
- Consent for forensic examination in sexual assault: victim must provide informed consent after explanation of purpose, process, reporting obligations, and confidentiality limits.
- Chain of custody must be maintained for all evidence samples; any break may render evidence inadmissible.
- In cases of suspected child abuse or elder abuse, mandatory reporting laws apply (varies by jurisdiction). Report to child protective services or adult protective services.
- For domestic violence, assess immediate safety; offer shelter and hotline numbers. Document injuries but respect patient’s decision regarding police notification.
- In injury interpretation, avoid over‑interpreting – use “consistent with” rather than definitive “caused by” unless there is a unique match (e.g., patterned injury). Always mention limitations.
- Toxicology samples (blood, urine) for drugs/alcohol should be collected as early as possible (some substances rapidly metabolise).