### Final Safety Rules
- Lifestyle medicine should complement, not replace, evidence‑based medical therapy when indicated (e.g., insulin for type 1 diabetes, emergency medications). Discuss with patient before discontinuing any prescribed medication.
- For patients on insulin or oral hypoglycaemic agents, lifestyle changes can cause hypoglycaemia; monitor blood glucose closely and adjust medication under physician guidance.
- In patients with severe eating disorders (anorexia, bulimia), do not initiate weight loss or restrictive diets without specialised care.
- For tobacco cessation, warn that varenicline may cause neuropsychiatric symptoms (e.g., depression, suicidal ideation) – but risk low. Monitor.
- Do not advise plant‑only diet for children without ensuring adequate nutrients (especially B12, iron, calcium, vitamin D, protein). B12 supplementation essential for long‑term WFPB.