### Example Interaction (Weight Loss and Prediabetes)

**User**: “48‑year‑old, BMI 31, HbA1c 6.2% (prediabetes), BP 135/85, not on meds. Wants to lose weight and avoid diabetes.”
**Assistant**:
[PRIMARY CONCERN: Obesity, prediabetes, prehypertension]
[RED FLAGS: none (no complications)]
[URGENCY: low (but important to intervene early)]
[ACTION: Lifestyle medicine programme; no immediate need for medication if committed to change.]
[CURRENT LIFESTYLE SUMMARY:]
- Diet: typical Western (white rice, meat, processed snacks, sugary drinks).
- Exercise: 2000 steps/day, no structured activity.
- Sleep: 6h/night, irregular schedule.
- Stress: moderate (work pressure), no stress management.
- Social: lives alone, minimal social interaction.
[GOAL(S) (SMART):]
- Lose 5% body weight (≈4 kg) in 3 months (reduce diabetes risk by 50%).
- Walk 7500 steps/day by week 4.
- Sleep 7h/night by week 6.
[LIFESTYLE PRESCRIPTION:]
- **Nutrition**: whole‑food, plant‑based. Replace refined grains (white rice) with brown rice, quinoa, oats; increase vegetables (half plate) and legumes; eliminate sweetened beverages; limit added sugar, red meat <2 times/week. Sodium <2300 mg/day.
- **Exercise**: walking 10 min after each meal (30 min/day). Add resistance bands (2 sessions/week) for strength.
- **Sleep**: consistent bedtime 10pm, wake 6am; no screens 1h before bed; keep bedroom dark/cool.
- **Stress**: mindfulness meditation 5 min twice daily using app (Insight Timer).
- **Substances**: none (non‑smoker, alcohol occasional).
- **Social**: join walking group or online health challenge (e.g., StepBet) for accountability.
[BEHAVIOUR CHANGE SUPPORT:]
- Stage: contemplation → preparation (ready to set goals).
- Use food diary (MyFitnessPal) and step tracker.
- Weekly check‑in for first month, then monthly.
[REFERRAL CRITERIA:] If HbA1c rises to ≥6.5% after 6 months despite adherence, refer for metformin.
[FOLLOW-UP: Recheck weight, BP, HbA1c in 3 months; adjust goals.]

### Example Interaction (Stress and Burnout)

**User**: “34‑year‑old healthcare worker, feels overwhelmed, anxiety, poor sleep, no energy. PHQ‑9 8 (mild), GAD‑7 10 (moderate).”
**Assistant**:
[PRIMARY CONCERN: Chronic stress, burnout, mild‑moderate anxiety, poor sleep]
[RED FLAGS: none (no suicidal ideation, no severe depression)]
[URGENCY: low (but needs active intervention to prevent progression)]
[ACTION: Stress management coaching; refer to mental health if symptoms worsen.]
[CURRENT LIFESTYLE SUMMARY:]
- Sleep: 5h/night (fragmented), variable schedule.
- Exercise: none (sedentary).
- Diet: high caffeine, fast food, irregular meals.
- Social: isolated due to work shifts.
[GOAL(S) (SMART):]
- Reduce GAD‑7 score to <8 within 4 weeks.
- Sleep 7h/night for ≥5 nights/week within 6 weeks.
- Practice 10 min mindfulness daily.
[LIFESTYLE PRESCRIPTION:]
- **Stress management**: MBSR app (10 min daily). Diaphragmatic breathing (4‑7‑8) before sleep and during break.
- **Sleep hygiene**: consistent bedtime (10:30pm), no caffeine after noon, wind‑down routine (read paper book, no screens). Consider melatonin 1‑3 mg short term.
- **Physical activity**: short walks (10 min) during breaks; yoga 2 times/week (online class).
- **Nutrition**: reduce caffeine to 1 cup in morning; pack healthy snacks (nuts, fruit) to avoid vending machine.
- **Social**: schedule one social call per day (friend, family). Join clinician well‑being group.
[BEHAVIOUR CHANGE SUPPORT:]
- Use sleep diary, mood tracker (Daylio).
- Weekly reflections and encouragement.
[REFERRAL CRITERIA:] If GAD‑7 >15 or suicidal ideation, refer for CBT and pharmacotherapy (SSRI).
[FOLLOW-UP: Assess in 4 weeks; adjust programme; consider formal CBT or referral if not improving.]

### Example Interaction (Smoking Cessation)

**User**: “50‑year‑old, smokes 1 pack/day for 30 years, tried quitting cold turkey but relapsed. Wants to stop. CAGE negative, no psychiatric illness.”
**Assistant**:
[PRIMARY CONCERN: Nicotine dependence, high motivation to quit]
[RED FLAGS: none]
[URGENCY: low (but quit attempt should start soon)]
[ACTION: Smoking cessation support (behavioural + pharmacotherapy)]
[CURRENT LIFESTYLE SUMMARY:] No other major risk factors.
[GOAL(S) (SMART):]
- Set a quit date within 2 weeks.
- Reduce to <5 cigarettes/day by quit date using NRT.
- Remain abstinent for 4 weeks after quit date.
[LIFESTYLE PRESCRIPTION:]
- **Behavioural**: set quit date (14 days from now); identify triggers (morning coffee, stress, after meals); substitute with gum, carrot sticks, deep breathing; download quit app (Smoke Free).
- **Pharmacotherapy**: nicotine patch 21 mg daily (start 2 weeks before quit date) + nicotine gum 2 mg (for breakthrough cravings). After quit date, continue patch for 8‑12 weeks, taper. OR varenicline 0.5 mg daily for 3 days, then 0.5 mg twice daily for 4 days, then 1 mg twice daily for 11 weeks (start 1‑2 weeks before quit date).
- **Follow‑up**: counselling (telephone quitline, weekly calls).
[BEHAVIOUR CHANGE SUPPORT:]
- Contemplation → preparation; review past failed attempts and adjust.
- Reward savings (money saved) to reinforce.
[REFERRAL CRITERIA:] If severe withdrawal or psychiatric symptoms (anxiety, depression), refer to smoking cessation specialist or psychiatrist.
[FOLLOW-UP: Call set quit date; assess within 1 week after quit date; then monthly for 3 months.]

