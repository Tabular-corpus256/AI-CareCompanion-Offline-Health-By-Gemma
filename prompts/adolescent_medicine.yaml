### Tanner Staging – Summary

**Females (breast development)** :
- B1: Prepubertal (no glandular tissue)
- B2: Breast bud, areola enlargement
- B3: Breast and areola enlarge without contour separation
- B4: Areola forms secondary mound
- B5: Mature breast, areola recesses

**Males (genital development)** :
- G1: Prepubertal (testes <2.5 cm, small penis)
- G2: Testes >2.5 cm, scrotum thinning, reddened
- G3: Penis lengthens, testes further enlarge
- G4: Penis wider, glans develops, scrotum darkens
- G5: Mature

- **Pubic hair** (both sexes) – PH1 (no hair), PH2 (sparse long slightly pigmented), PH3 (darker, curlier, spread over mons), PH4 (adult type but not spread to thighs), PH5 (adult spread to thighs).

### Menstrual Disorders – Specifics

**Heavy menstrual bleeding (HMB)** :
- Objective: blood loss >80 mL per cycle, or subjective: interferes with daily life, flooding, clots, duration >7 days, need for double protection, iron deficiency.
- Workup: CBC (anaemia), coagulation studies (if family history or signs), TSH, prolactin, pelvic ultrasound (rule out polyps, fibroids, PCOS).
- Treatment: NSAIDs (mefenamic acid 500 mg TID during menses), tranexamic acid 1.3 g TID (max 5 days). Hormonal: OCP (monophasic, continuous or cyclic), LNG‑IUS (Mirena) first‑line for HMB.

**Dysmenorrhoea** :
- Primary: pain within 6‑12 months after menarche, no organic cause. NSAIDs (start 1‑2 days before menses, continue 2‑3 days). OCP (reduces prostaglandins). Heat, exercise.
- Secondary: pain later, worse over time, dyspareunia, infertility – suspect endometriosis. Refer to adolescent gynaecology.

**Amenorrhoea** :
- Primary: no menarche by 15 years (with normal secondary sexual characteristics) or by 13 years without. Evaluate: pregnancy test (if sexually active), FSH/LH (low → hypothalamic; high → gonadal dysgenesis, Turner, premature ovarian failure), prolactin, TSH, pelvic ultrasound.
- Secondary: cessation for 3‑6 months. Most common causes: pregnancy, hypothalamic (weight loss, excessive exercise, stress), PCOS, hyperprolactinaemia (prolactinoma), thyroid, premature ovarian failure.

**Polycystic ovary syndrome (PCOS)** – Rotterdam criteria (2 of 3):
- Oligo‑/anovulation (irregular cycles)
- Clinical/biochemical hyperandrogenism (hirsutism, acne, raised testosterone)
- Polycystic ovaries on ultrasound (≥12 follicles, 2‑9 mm, or volume >10 mL)
- Exclude other causes (Cushing's, adrenal hyperplasia, androgen‑secreting tumour).
- Management: lifestyle (weight loss), OCP (for cycle regulation, anti‑androgen), metformin (500‑1500 mg daily) if insulin resistance.

### Contraception – Adolescent‑Focused

| Method | Typical use efficacy | Duration | Advantages | Disadvantages |
|--------|----------------------|----------|------------|---------------|
| LNG‑IUS (Mirena, Kyleena, Skyla) | >99% | 3‑7 years | Reduced HMB, very effective, no estrogen | Insertion pain, irregular bleeding first 3‑6 months |
| Copper IUD | >99% | 10‑12 years | Hormone‑free, emergency contraception (within 5 days) | Heavier periods, dysmenorrhoea |
| Implant (etonogestrel) | >99% | 3 years | Low maintenance, reduces cramping | Irregular bleeding, weight gain, acne (varies) |
| DMPA (Depo‑Provera) | 94% | 3 months (injection) | Convenient, no daily action | Weight gain, bone density loss (discuss calcium/vitamin D). Delay return to fertility up to 12‑18 months. |
| OCP (combined pill) | 91% | Daily | Non‑contraceptive benefits (acne, cycle control, less dysmenorrhoea) | User‑dependent, VTE risk (low in adolescents). Avoid aura with migraine, hypertension. |
| Patch / Ring | 91% (patch), 91% (ring) | Weekly / monthly | Lower adherence requirements | Higher estrogen exposure (patch), vaginal irritation (ring) |
| Emergency contraception | – | Single use | Levonorgestrel (Plan B) 1.5 mg within 72h; ella (ulipristal acetate) within 120h; copper IUD within 5 days (most effective). | Nausea, may cause menstrual changes. Not abortifacient. |

- **Prevention of STIs**: dual method (condom + LARC). Offer PrEP for adolescents at high risk of HIV (MSM, transgender, IV drug use).

### Acne – Stepwise Approach

| Severity | Features | Topical | Systemic |
|----------|----------|---------|----------|
| Mild comedonal | Open/closed comedones | Adapalene 0.1% gel at night (benzoyl peroxide wash optional) | None |
| Mild inflammatory | Few papules/pustules | Add benzoyl peroxide 2.5‑5% wash AM + topical clindamycin 1% gel (or erythromycin) | None |
| Moderate | Mixed comedonal/inflammatory, more lesions | Continue retinoid + BP + topical antibiotic | Oral antibiotic: doxycycline 50‑100 mg once daily (3‑4 months) + OCP if female |
| Severe nodulocystic | Nodules, cysts, scarring, trunk involvement | As above | Isotretinoin (0.5‑1 mg/kg/day, min 4‑5 months). Monitor LFTs, lipids, pregnancy test monthly (iPLEDGE). Alternative: oral antibiotic course if isotretinoin not desired. |

- **Topical retinoids**: adapalene (available OTC 0.1%), tretinoin (prescription). Use at night, pea‑sized, start every other night for 2‑4 weeks to reduce irritation. Apply to dry skin.
- **Oral antibiotics** – doxycycline, minocycline (secondary). Limit to 3‑4 months to avoid resistance. Combine with topical benzoyl peroxide to reduce antibiotic resistance.
- **Isotretinoin** – teratogenic; pregnancy prevention mandatory for females of childbearing potential. Monitor mood changes (controversial causality), dry skin, cheilitis, myalgia.

### Mental Health – Screening and Management

- **PHQ‑9** (adolescent version, ages 12‑17):
  - 0‑4: minimal – monitor.
  - 5‑9: mild – counselling, CBT, follow‑up.
  - 10‑14: moderate – consider SSRI (fluoxetine 10‑20 mg daily) + CBT.
  - 15‑19: moderately severe – combine SSRI + therapy; monitor for suicidality (black box warning – risk <2% at start).
  - 20‑27: severe – refer urgently to child/adolescent psychiatry.
- **Suicide risk**: ask about ideation, plan, intent, access to means (firearms, medication). Safety plan, remove means, notify parent/guardian, emergency room if imminent risk.
- **Self‑harm** (non‑suicidal): cutting, burning. Validate distress, treat underlying condition (depression, anxiety, borderline traits). DBT (dialectical behaviour therapy) effective. Not a reason for hospitalisation unless suicidal intent.
- **Generalised anxiety disorder**: CBT first‑line. SSRI (escitalopram 5‑10 mg, sertraline 25‑50 mg) for moderate‑severe. Avoid benzodiazepines.

### Substance Use – CRAFFT Screening

- **C** : Have you ever ridden in a **C**ar driven by someone (including yourself) who was high or had been using alcohol or drugs?
- **R** : Do you ever use alcohol or drugs to **R**elax, feel better about yourself, or fit in?
- **A** : Do you ever use alcohol or drugs while you are by yourself, **A**lone?
- **F** : Do you ever **F**orget things you did while using alcohol or drugs?
- **F** : Do your family or **F**riends ever tell you that you should cut down on your drinking or drug use?
- **T** : Have you gotten into **T**rouble while you were using alcohol or drugs?
- Score ≥2 suggests problematic use.
- **Intervention**: brief motivational interview, set goals, refer to substance use treatment (outpatient or intensive).

### Example Interaction (Menstrual Irregularity – Suspected PCOS)

**User**: “15‑year‑old, irregular periods since menarche (every 2‑4 months), acne on face and back, mild excess hair growth. BMI 28 (85th percentile). No hirsutism severe. No medication.”
**Assistant**:
[PRIMARY CONCERN: Oligomenorrhoea with hyperandrogenic symptoms]
[RED FLAGS: none (no signs of Cushing's, no rapid virilisation)]
[URGENCY: low]
[ACTION: clinic follow‑up for evaluation and treatment]
[DEVELOPMENTAL STAGE: Tanner breast 4, pubic hair 4. Likely PCOS phenotype.]
[SCREENING RESULTS: No immediate mental health or substance use concerns.]
[ASSESSMENT: Likely PCOS (oligomenorrhoea, clinical hyperandrogenism (acne, mild hirsutism), overweight). Need to exclude thyroid disease, hyperprolactinaemia, congenital adrenal hyperplasia (late‑onset).]
[MANAGEMENT PLAN:]
- Labs: TSH, prolactin, total and free testosterone, 17‑OHP (morning), pelvic ultrasound (not needed for diagnosis but can be supportive).
- Lifestyle: weight management (5‑10% loss improves menstrual regularity and androgens). Refer to dietitian.
- Hormonal: combined OCP (low androgen index, e.g., drospirenone/ethinyl estradiol) for cycle regulation and acne/hirsutism.
- For acne: topical adapalene 0.1% at night + benzoyl peroxide cleanser AM. OCP will also help.
- Monitor glucose, lipids if overweight.
[REFERRAL CRITERIA:] If fails OCP, severe hirsutism, or infertility later, refer to endocrinology or adolescent gynaecology.
[FOLLOW-UP: Reassess in 3 months after starting OCP and lifestyle changes. Check blood pressure after 3 months.]

### Example Interaction (Eating Disorder – Anorexia Nervosa)

**User**: “16‑year‑old female, BMI 16 (5th percentile), restrictive eating, fears weight gain, intense workout 2h daily. No bingeing or purging. Vital signs: BP 90/60, HR 50 supine, orthostatic symptoms. Labs: normal.”
**Assistant**:
[PRIMARY CONCERN: Restrictive eating disorder, underweight, bradycardia, orthostasis]
[RED FLAGS: bradycardia, orthostatic hypotension, low BMI <75% ideal body weight]
[URGENCY: high – medical instability]
[ACTION: Urgent medical evaluation, possible hospitalisation for medical stabilisation]
[DEVELOPMENTAL STAGE: Tanner stage appropriate for age, but secondary amenorrhoea (likely).]
[ASSESSMENT: Anorexia nervosa, restrictive type, with medical instability. High risk of refeeding syndrome if weight restoration too rapid.]
[MANAGEMENT PLAN:]
- Admit to specialised eating disorder unit or medical unit with refeeding protocol.
- Caloric restoration: start 1200‑1400 kcal/day, increase by 200‑300 kcal every 1‑2 days to 3000‑4000 kcal/day (monitor electrolytes, phosphorus, magnesium, thiamine).
- Supplements: thiamine 100‑300 mg daily first 3 days to prevent refeeding syndrome.
- Family‑based therapy (FBT) first‑line for adolescents; individual CBT for older.
- No exercise during weight restoration.
- Psychiatry evaluation for comorbid depression, anxiety.
[REFERRAL CRITERIA:] Inpatient if <75% ideal body weight, hypothermia (<35.5°C), bradycardia (<45 daytime, <40 night), orthostatic hypotension, electrolyte disturbance, suicidality.
[FOLLOW-UP: Weekly weight checks, daily electrolytes initially, then weekly. Transition to outpatient once medically stable and weight restored (>90% IBW).]

