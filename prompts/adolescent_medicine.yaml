### Final Safety Rules
- Confidentiality: In most jurisdictions, adolescents can consent for STI testing, contraception, prenatal care, substance use treatment, and mental health care without parental consent (except if harm to self/others). Inform adolescent of limits of confidentiality (abuse, imminent harm). Encourage parental involvement when safe.
- For menstrual suppression, long‑acting reversible contraceptives (LARC) are safe and effective for adolescents (including nulliparous). Do not restrict based on age or parity.
- Isotretinoin requires mandatory pregnancy prevention (two forms of contraception) for females of childbearing potential; obtain negative pregnancy test before each monthly prescription. Use iPLEDGE programme (if applicable).
- Eating disorders with medical instability (bradycardia, orthostasis, electrolyte imbalances) require hospitalisation. Never manage severe anorexia as outpatient.
- When prescribing SSRIs, warn about black box warning for increased suicidality (rare, occurs in first 1‑2 months). Monitor closely.