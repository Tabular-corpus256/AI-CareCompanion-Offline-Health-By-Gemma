### Red Eye – Differential Diagnosis

| Condition | Features | Vision | Pain | Discharge | Conjunctiva | Cornea | Urgency |
|-----------|----------|--------|------|-----------|-------------|--------|---------|
| Viral conjunctivitis | watery discharge, pre‑auricular lymph node | Normal | Mild | Watery | Diffuse injection | Clear | Low |
| Bacterial conjunctivitis | mucopurulent discharge, glued eyelids | Normal/mild blur | Mild | Purulent | Diffuse injection | Clear | Low |
| Allergic conjunctivitis | itching, seasonal, stringy discharge | Normal | Itch | Stringy mucus | Injection | Clear | Low |
| Subconjunctival haemorrhage | painless bright red patch, no discharge | Normal | None | None | Focal blood | Clear | Low |
| Episcleritis | sectoral redness, nodular or diffuse, mild tenderness | Normal | Mild ache | None | Sectoral injection | Clear | Low |
| Scleritis | deep boring pain, violaceous hue, photophobia | May decrease | Severe | None | Deep vessels | May be involved | High (refer) |
| Corneal abrasion | FB sensation, tearing, photophobia | Blurred | Moderate | Tearing | Ciliary flush | Abrasion with fluorescein uptake | Medium |
| Corneal ulcer | white opacity, pain, photophobia, discharge | Moderate‑severe loss | Severe | Purulent | Ciliary flush | Infiltrate/ulcer | High |
| Acute uveitis (iritis) | photophobia, ciliary flush, small pupil, cells in anterior chamber | Mild blur | Moderate | None | Ciliary flush | Clear with keratic precipitates | Medium‑high |
| Acute angle‑closure glaucoma | severe pain, nausea, halos, mid‑dilated fixed pupil, high IOP | Sudden severe | Severe | None | Diffuse injection | Oedematous (cloudy) | Emergency |
| Endophthalmitis | post‑surgery/trauma, severe pain, hypopyon | Severe | Severe | None | Injection | Hazy | Emergency |

### Emergency Eye Conditions – Immediate Referral

1. **Acute angle‑closure glaucoma**:
   - Symptoms: sudden severe eye pain, headache, nausea/vomiting, blurred vision, halos around lights, mid‑dilated fixed pupil.
   - Measurement: IOP often >40 mmHg (normal 10‑21). Corneal oedema gives cloudy appearance.
   - Immediate action: Give topical beta‑blocker (timolol 0.5%) + pilocarpine 2% (if not contraindicated) + oral acetazolamide 500mg (if no sulfa allergy). Refer immediately for laser iridotomy.

2. **Central retinal artery occlusion (CRAO)**:
   - Symptoms: sudden, painless, profound monocular vision loss (like a curtain down).
   - Sign: relative afferent pupillary defect (RAPD), cherry‑red spot on macula.
   - Action: Emergency (within hours). Ocular massage, high flow oxygen, reduce IOP (acetazolamide). Refer for thrombolysis (within 4‑6h) – limited evidence but urgent evaluation.

3. **Retinal detachment**:
   - Symptoms: flashing lights, floaters, curtain‑like vision loss (often starting peripherally).
   - Signs: reduced vision, RAPD, retinal elevation on dilated exam.
   - Action: Urgent referral (within 24h) for surgical repair (pneumatic retinopexy, scleral buckle, vitrectomy).

4. **Chemical burn** (especially alkali, e.g., lime, drain cleaner):
   - Immediate: copious irrigation with any available clean fluid (saline, water, Ringer's lactate) for 15‑20 minutes continuously, everting eyelids to remove particulate matter.
   - Refer immediately after irrigation. Alkali burns cause rapid penetration and severe damage.

5. **Open globe / ruptured globe**:
   - Signs: full thickness corneal/scleral laceration, peaked pupil, shallow anterior chamber, exposed uveal tissue.
   - Action: DO NOT apply pressure. Place rigid shield (not eye patch). No topical medications. Emergency surgery.

6. **Endophthalmitis** (post‑operative or post‑traumatic):
   - Symptoms: worsening pain, redness, vision loss after intraocular surgery or penetrating injury, hypopyon (pus in anterior chamber).
   - Action: Immediate referral; intravitreal antibiotics and possibly vitrectomy.

### Common Eye Medications (Use `get_drug_info`)

| Drug class | Examples | Indications | Side effects | Precautions |
|------------|----------|-------------|--------------|-------------|
| Topical antibiotics | ofloxacin, moxifloxacin, chloramphenicol | Bacterial conjunctivitis, corneal ulcer, prophylaxis | Stinging, allergy | Chloramphenicol – rare aplastic anaemia (avoid prolonged use) |
| Topical antivirals | acyclovir, ganciclovir gel | Herpes keratitis (dendritic ulcer) | Stinging | Do not use steroids alone – can worsen viral keratitis |
| Topical steroids | prednisolone acetate 1%, dexamethasone | Uveitis, scleritis, post‑surgery | Increased IOP, cataract, infection | Contraindicated in epithelial herpes keratitis |
| Topical beta‑blockers | timolol 0.5% | Open‑angle glaucoma, acute angle‑closure (adjunct) | Bradycardia, hypotension, asthma exacerbation | Avoid in asthma, heart block, heart failure |
| Prostaglandin analogues | latanoprost | Open‑angle glaucoma | Increased iris pigmentation, eyelash growth, conjunctival injection | First‑line for glaucoma (once daily) |
| Carbonic anhydrase inhibitors | dorzolamide (topical), acetazolamide (oral) | Glaucoma, acute angle‑closure | Bitter taste (topical), paraesthesia, metabolic acidosis (oral) | Oral: cannot if sulfa allergy |
| Cycloplegics | atropine, cyclopentolate, homatropine | Uveitis (pain relief, prevents synechiae), refraction in children | Photophobia, blurred near vision, facial flushing, rarely confusion (elderly) | Atropine longer lasting (7‑10 days) |

### Glaucoma – Open Angle vs Angle Closure

- **Primary open‑angle glaucoma** (POAG):
  - Risk factors: age >40, family history, high myopia, African descent, diabetes.
  - Symptoms: none until advanced (silent thief of sight). Peripheral vision loss first.
  - Signs: IOP >21 mmHg (but can be normal – normal tension glaucoma), optic disc cupping >0.5, nerve fibre layer defects, visual field loss.
  - Treatment: topical prostaglandin (latanoprost) once daily; add timolol or dorzolamide if needed. Refer for laser (SLT) or surgery if uncontrolled.
  - Follow‑up: IOP every 3‑6 months, visual field and OCT annually.

- **Acute angle‑closure glaucoma** (see emergency section).

### Diabetic Retinopathy (DR) – Screening and Management

- **Background DR** (non‑proliferative): microaneurysms, dot‑blot haemorrhages, hard exudates. No treatment except metabolic control. Annual exam.
- **Pre‑proliferative DR**: cotton‑wool spots, venous beading, intraretinal microvascular abnormalities (IRMA). May need panretinal laser if severe.
- **Proliferative DR**: neovascularisation (on disc or elsewhere), vitreous haemorrhage, tractional retinal detachment. Refer urgently for panretinal laser or anti‑VEGF injections (ranibizumab, aflibercept).
- **Diabetic macular oedema (DMO)**: retinal thickening and exudates at macula – leading cause of vision loss. Treat with anti‑VEGF injections (first line) ± laser.
- **Action**: All diabetics should have dilated eye exam annually (type 1: after 5 years; type 2: at diagnosis). Pregnancy accelerates progression.

### Age‑Related Macular Degeneration (AMD)

- **Dry AMD** (90%):
  - Features: drusen, geographic atrophy (central vision loss gradual).
  - No specific treatment but AREDS2 supplements (vitamin C, E, zinc, lutein, zeaxanthin) may slow progression.
  - Monitor with Amsler grid for metamorphopsia (wavy lines) – indicates conversion to wet.

- **Wet AMD** (10%):
  - Features: choroidal neovascularisation (CNV) – rapid central vision loss, metamorphopsia, scotoma. Fundoscopy: subretinal fluid, blood.
  - Treatment: anti‑VEGF injections (ranibizumab, aflibercept, bevacizumab) – monthly or bimonthly. Refer urgently (within 1‑2 weeks) for treatment.

### Paediatric Eye Conditions

| Condition | Age | Features | Screening | Treatment |
|-----------|-----|----------|-----------|-----------|
| Amblyopia (lazy eye) | 3‑7 years | Reduced vision in one eye despite correction, no organic cause | Vision screening at preschool | Patching good eye, glasses, atropine penalisation – treat before age 7 |
| Strabismus (squint) | Any | Misalignment (esotropia, exotropia, hypertropia) | Corneal light reflex, cover test | Glasses, occlusion therapy, surgery if non‑accommodative |
| Refractive errors | Any | Myopia, hyperopia, astigmatism | Photo‑screening or cycloplegic refraction | Glasses, contact lenses (myopia progression control: atropine, MiSight) |
| Congenital cataract | Newborn | White pupil (leukocoria), nystagmus, strabismus | Red reflex test (must see red reflex bilaterally) | Early cataract surgery (within weeks) to prevent amblyopia |
| Retinoblastoma | <5 years | Leukocoria (cat's eye reflex), strabismus, eye pain | Red reflex, ultrasound, MRI | Urgent referral (life‑saving) |
| Nasolacrimal duct obstruction | Birth to 12 months | Watery eye, discharge, failure to resolve spontaneously | Careful probing if persistent beyond 12 months | Crigler massage (press on sac), probing under anaesthesia if >12m |

### Corneal Abrasion / Ulcer

- **Corneal abrasion**: removal of corneal epithelium. Symptoms: severe pain, tearing, photophobia, foreign body sensation. Diagnosis: fluorescein stain (yellow‑green uptake). Management:
  - Antibiotic drops (ofloxacin or chloramphenicol QID) to prevent infection.
  - Cycloplegic (cyclopentolate 1%) for pain relief (paralyse ciliary muscle).
  - Patching no longer recommended (delays healing). Eye shield at night.
  - Most heal in 24‑48h. Refer if >5mm, central, or not healing.

- **Corneal ulcer** (infectious keratitis): epithelial defect + stromal infiltrate (white opacity). Risk factors: contact lens wear, trauma, ocular surface disease. Common pathogens: bacteria (pseudomonas, staph), fungi (if plant injury), virus (herpes), acanthamoeba (contaminated water).
  - Action: Refer urgently to ophthalmology for culture and specific antimicrobial therapy. Never start steroids.

### Example Interaction (Acute Angle‑Closure Glaucoma)

**User**: “56‑year‑old with sudden right eye pain, blurry vision, halos around lights, nausea. Pupil is mid‑dilated and fixed.”
**Assistant**:
[PRIMARY CONCERN: Acute angle‑closure glaucoma]
[RED FLAGS: severe pain, nausea, halos, mid‑dilated fixed pupil – high IOP likely]
[URGENCY: high – emergency]
[ACTION: immediate referral to nearest emergency department with ophthalmology]
[ASSESSMENT: Acute angle‑closure glaucoma, likely IOP >40 mmHg. Threatens irreversible vision loss.]
[ADVICE BEFORE TRANSFER:]
- Keep patient upright. Do not give oral fluids.
- If available and no contraindications:
  - Timolol 0.5% eye drop one drop in affected eye.
  - Acetazolamide 500mg oral (if no sulfa allergy).
  - Pilocarpine 2% (one drop, but wait if IOP very high – can wait until after IOP is lowered).
- Refer immediately – requires laser iridotomy or surgical iridectomy.
[DANGER SIGNS: vomiting worsens fluid loss; if bilateral (rare) or if unable to get to hospital, call ambulance.]
[FOLLOW-UP: After laser iridotomy, follow‑up IOP check and prophylactic treatment on fellow eye (since 40‑80% risk of similar attack).]

### Example Interaction (Diabetic Retinopathy Screening)

**User**: “Type 2 diabetes for 8 years, HbA1c 8.5%, has not had eye exam. No vision complaints.”
**Assistant**:
[PRIMARY CONCERN: Diabetic retinopathy screening]
[RED FLAGS: long‑standing poor control, no previous exam, but no vision symptoms yet]
[URGENCY: low (but needed soon)]
[ACTION: clinic visit for dilated eye exam within 1‑2 weeks]
[ASSESSMENT: Asymptomatic – but high risk for non‑proliferative diabetic retinopathy, possibly diabetic macular oedema]
[ADVICE:]
- Schedule a dilated fundus exam by optometrist or ophthalmologist.
- If no retinopathy, repeat annually. If any retinopathy, more frequent (6‑12 months).
- Improve glycaemic control (HbA1c <7%), blood pressure <130/80, LDL <100 mg/dL.
- Control lipids; also discuss with endocrinologist SGLT2 inhibitors for kidney and eye protection.
[REFERRAL CRITERIA:] Any proliferative retinopathy or DMO – refer to ophthalmologist for possible laser or anti‑VEGF.
[FOLLOW-UP: After screening, bring report to primary care. Yearly follow‑up if no retinopathy; earlier if any abnormality.]

### Example Interaction (Chemical Burn – Emergency)

**User**: “A worker splashed lime powder in eye 5 minutes ago. Eye is red, watering, patient in severe pain.”
**Assistant**:
[PRIMARY CONCERN: Chemical eye burn (alkali – lime is alkaline)]
[RED FLAGS: alkali burn, particulate matter, severe pain]
[URGENCY: high – emergency]
[ACTION: Immediate irrigation while arranging transfer to hospital]
[ASSESSMENT: Alkali burn – potential for severe corneal and anterior segment damage.]
[ADVICE:]
- **Immediately** irrigate eye with clean running water or saline for at least 15‑20 minutes. Use lid retractors (fingers) to evert eyelids to remove any residual particulate lime.
- After irrigation, do not patch. Use topical antibiotic (ofloxacin) if available.
- Transport to ophthalmology emergency as soon as possible.
- Do NOT try to neutralize acid with alkali or vice versa – this can cause thermal injury.
[DANGER SIGNS: Vision loss, dense corneal haze, raised IOP – indicate severity.]
[FOLLOW-UP: In hospital, pH will be checked, debridement, and possibly amniotic membrane grafting, intensive steroids, and surgery.]

