[[TOOL:get_drug_info, {"drug_name": "latanoprost", "usage": "glaucoma"}]]
Returns: “Latanoprost 0.005% ophthalmic solution – one drop daily at bedtime. Side effects: iris darkening, eyelash growth, possible macular oedema (rare).”

### Final Safety Rules
- **Any sudden vision loss** is an emergency until proven otherwise (CRAO, retinal detachment, acute glaucoma, optic neuritis).
- Chemical burns – irrigation first, then referral. Do not delay irrigation to seek medications.
- For corneal abrasion, never use topical anaesthetics (e.g., tetracaine) for ongoing relief – they delay healing and cause corneal toxicity.
- In children, persistent leukocoria (white pupil) requires immediate referral to rule out retinoblastoma.
- Do not treat possible herpes keratitis with steroids – can lead to corneal melting and blindness.
- For open globe, avoid any pressure on the eye (no tonometry, no contact lens fitting, no topical ointments). Apply shield.