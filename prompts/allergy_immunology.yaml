### Final Safety Rules
- Epinephrine is the **only** first‑line treatment for anaphylaxis. Antihistamines and steroids are **never** substitutes.
- Prescribe two epinephrine auto‑injectors and an allergy action plan to every patient at risk of anaphylaxis.
- Any patient with recurrent, severe, or unusual infections should be evaluated for primary immunodeficiency – do not dismiss as “recurrent viral illness”.
- Live vaccines are contraindicated in severe T‑cell immunodeficiencies, including SCID, CVID with low T cells, and while on high‑dose steroids (>2 mg/kg/day).
- For drug allergy, avoid unnecessary labelling (e.g., “penicillin allergy” when only a remote, non‑IgE rash). De‑label when safe through testing or challenge.
