### Common Withdrawal Syndromes – Key Features

| Substance | Onset | Duration | Key symptoms | Danger signs | Treatment |
|-----------|-------|----------|--------------|--------------|------------|
| Alcohol | 6‑24h | 5‑7 days | Tremor, agitation, nausea, seizures, autonomic hyperactivity, hallucinations (visual/tactile) | Withdrawal seizures (12‑48h), delirium tremens (DT; 48‑96h) – fever, confusion, autonomic instability, high mortality | Benzodiazepines (diazepam, lorazepam), thiamine, supportive |
| Opioids | 8‑24h (heroin), 30‑72h (methadone) | 5‑10 days | Restlessness, yawning, rhinorrhoea, mydriasis, piloerection, muscle aches, diarrhoea, vomiting | Not life‑threatening (in otherwise healthy); however dehydration, electrolyte disturbance possible | Symptomatic (clonidine, loperamide); MAT: buprenorphine or methadone |
| Benzodiazepines | 1‑4 days (short acting), 5‑14 days (long acting) | weeks | Anxiety, insomnia, tremor, seizures, psychosis, autonomic instability | Seizures, delirium (protracted) | Long‑acting benzodiazepine taper (diazepam) or phenobarbital |
| Stimulants (cocaine, amphetamine) | 12‑24h (crash) | 1‑2 weeks | Depression, fatigue, agitation, craving, hyperphagia, hypersomnia | Suicidal ideation, psychosis, severe depression | Supportive, treat mood symptoms (SSRIs, bupropion) |
| Nicotine | 2‑12h | 2‑4 weeks | Irritability, anxiety, difficulty concentrating, increased appetite, craving | Not life‑threatening | NRT, varenicline, bupropion |

### Alcohol Withdrawal – CIWA‑Ar Scoring (0‑67)

- **Mild (<8)**: manage outpatient with supportive care and offer medication (gabapentin, carbamazepine, or low dose benzodiazepine as needed).
- **Moderate (9‑15)**: outpatient possible with family support; benzodiazepine (symptom‑triggered or fixed taper). Consider inpatient if high risk (prior DT, significant medical comorbidity).
- **Severe (>15)**: inpatient detoxification, IV benzodiazepine protocol (sometimes phenobarbital). Additional monitoring for DT.

**Benzodiazepine protocol (symptom‑triggered)** : lorazepam 2‑4 mg IV if CIWA >15, repeat q1h until ≤8. For milder, oral: chlordiazepoxide 50‑100 mg q6h tapering over 3‑5 days.

**Thiamine**: 100 mg IV/IM followed by 100 mg daily oral for ≥5 days (prevent Wernicke encephalopathy).

### Opioid Withdrawal – COWS Score (0‑48)

- **<5**: no withdrawal; not ready for induction.
- **5‑12**: mild; can consider buprenorphine induction if comfortable.
- **13‑24**: moderate; ideal window for buprenorphine induction.
- **25‑36**: moderately severe; treat symptoms first.
- **>36**: severe; may require hospitalization.

**Buprenorphine induction** (microinduction or standard):
- Standard: wait until COWS ≥12 (mid‑moderate). Give 2‑4 mg sublingual, monitor. Repeat 2‑4 mg every 1‑2h up to 8‑12 mg first day. Total daily dose 12‑24 mg (maintenance).
- Microinduction (low dose start): start buprenorphine 0.5 mg while still using opioids, gradually increase over 5‑7 days while tapering full agonist. Low risk of precipitated withdrawal.

**Methadone induction**: requires daily observed dosing at OTP. Start 20‑30 mg, increase by 5‑10 mg every 3‑5 days to effective dose (60‑120 mg).

**Naltrexone for OUD**: requires complete detoxification (opioid‑free >7‑14 days). Usually initiate after inpatient detox or long‑term residential. Oral 25 mg test dose, then 50 mg daily. Precipitates withdrawal if any opioid still on board.

### Example Interaction (Alcohol Withdrawal – Moderate)

**User**: “55‑year‑old male, drinking 15 drinks daily, last drink 18h ago. CIWA 12. Tremor, mild nausea, no seizures, no hallucinations.”
**Assistant**:
[PRIMARY SUBSTANCE / BEHAVIOUR: Alcohol use disorder, moderate withdrawal]
[RED FLAGS: none (no seizures, no delirium)]
[URGENCY: medium (requires detox, but can be outpatient if reliable support)]
[ACTION: outpatient medically supervised withdrawal (or inpatient if risk factors)]
[SCREENING SCORES: CIWA 12 (moderate)]
[ASSESSMENT: Moderate alcohol withdrawal. High risk for progression to severe withdrawal (DT) given high daily intake. Consider inpatient if no social support, previous DT, medical comorbidities.]
[MANAGEMENT PLAN:]
- **Benzodiazepine symptom‑triggered**: diazepam 10 mg orally, repeat in 1‑2h if CIWA remains >10; then review q4‑6h. Expected total 40‑60 mg over 2‑3 days, then taper.
- **Thiamine**: 100 mg orally daily for 5 days (IM if vomiting).
- **Multivitamin**, hydration.
- **MAT for alcohol**: After withdrawal, consider naltrexone 50 mg daily (or monthly injection) to reduce craving. Start when CIWA <5.
- **Psychosocial**: motivational interviewing, refer to mutual‑help group (AA), consider residential treatment if no stable housing.
[REFERRAL CRITERIA:] If CIWA >15 or fails outpatient, admit for inpatient detox. If refractory, consider phenobarbital protocol.
[DANGER SIGNS: Seizures, confusion, visual/tactile hallucinations, fever, autonomic instability (DT) – emergency.]
[FOLLOW-UP: Reassess CIWA daily until <5. Check liver function, thiamine levels. Addiction medicine follow‑up within 1 week for MAT initiation.]

### Example Interaction (Opioid Use Disorder – Buprenorphine Induction)

**User**: “28‑year‑old using heroin daily, last dose 12h ago, COWS 14. Wants to start buprenorphine. No other medical issues.”
**Assistant**:
[PRIMARY SUBSTANCE / BEHAVIOUR: Heroin use disorder, moderate withdrawal]
[RED FLAGS: none]
[URGENCY: medium (but need to start MAT today)]
[ACTION: clinic (office‑based opioid treatment) for buprenorphine induction]
[SCREENING SCORES: COWS 14 – appropriate timing for standard induction]
[ASSESSMENT: Opioid use disorder, moderate severity. Good candidate for buprenorphine/naloxone (Suboxone).]
[MANAGEMENT PLAN:]
- **Induction**: buprenorphine/naloxone 4 mg sublingual, observe for 60‑90 min. If no precipitated withdrawal, repeat 4 mg. Total first day 8 mg. COWS should drop to <5 within 1‑2h. Plan to reach 12‑16 mg by day 3.
- **Maintenance**: 12‑24 mg daily, preferably supervised initially, then take‑home doses.
- **Psychosocial**: weekly individual counselling or group therapy. Refer to community support groups (NA, SMART Recovery).
- **Harm reduction**: prescribe naloxone, offer fentanyl test strips, clean needles if IV use continues.
- **Test for HIV, HCV, pregnancy, LFTs, creatinine, UDS.
[REFERRAL CRITERIA:] If co‑occurring severe psychiatric disorder, severe pain, or polysubstance dependence, consider referral to dual diagnosis or residential treatment.
[DANGER SIGNS: Precipitated withdrawal (if COWS <12 or fentanyl use – wait longer, use microinduction). Overdose (respiratory depression) – naloxone, EMS.]
[FOLLOW-UP: See daily for first week, then weekly for 4 weeks, then monthly. Monitor UDS, adherence, side effects.]

