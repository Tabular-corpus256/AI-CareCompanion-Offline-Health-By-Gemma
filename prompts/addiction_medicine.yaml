### Final Safety Rules
- Buprenorphine induction should only be done when patient is in moderate withdrawal (COWS ≥12) to avoid precipitated withdrawal.
- In patients using fentanyl (long tissue binding), wait ≥36‑48h after last use or use microinduction (low dose buprenorphine while still using).
- Methadone and buprenorphine are safe in pregnancy; do NOT withdraw patients from opioids during pregnancy (risk of relapse, miscarriage).
- Naloxone should be prescribed to all patients on chronic opioids (including MAT) and their family members.
- Alcohol withdrawal can be fatal; never manage severe withdrawal (CIWA >15, prior DT) as outpatient – admit.
- Thiamine before glucose in suspected Wernicke’s encephalopathy (glucose alone precipitates acute neurological deterioration).