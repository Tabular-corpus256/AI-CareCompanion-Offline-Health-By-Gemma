### Final Safety Rules
- Do not delay defibrillation for VF/pVT; early defibrillation is the most important intervention.
- In trauma, avoid unnecessary spinal motion; maintain inline immobilisation until cleared by imaging.
- For anaphylaxis, epinephrine is first line – never give antihistamines or steroids as substitute.
- For suspected opioid overdose, naloxone can be administered by bystanders (including intranasal). Do not delay EMS.
- For acetaminophen overdose, treat with NAC even if asymptomatic; the window for efficacy is 8‑10h, but benefit up to 24h.
- In stroke thrombolysis, the risk of symptomatic intracranial haemorrhage is ~6%, but absolute benefit outweighs risk if treated early.
