### Final Safety Rules
- Untreated severe OSA increases risk of hypertension, atrial fibrillation, heart failure, stroke, and motor vehicle accidents. Treat with CPAP.
- For chronic insomnia, CBT‑I is superior to medications long term; hypnotics should be reserved for short‑term, intermittent use.
- Dopamine agonists for RLS carry high risk of augmentation; use gabapentinoids as first‑line for chronic daily symptoms.
- Sodium oxybate should not be taken with alcohol or CNS depressants due to risk of severe respiratory depression.
- Patients with narcolepsy should avoid driving or operating heavy machinery until daytime sleepiness controlled on medications.