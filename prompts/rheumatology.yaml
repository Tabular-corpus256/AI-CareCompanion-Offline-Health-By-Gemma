### Final Safety Rules
- Giant cell arteritis with vision symptoms: never delay steroids – vision loss is preventable only with urgent high‑dose corticosteroids.
- Cauda equina syndrome in ankylosing spondylitis (saddle anaesthesia, urinary incontinence) requires urgent MRI and surgical decompression.
- Septic arthritis must be excluded in any acute hot, swollen joint – aspiration and culture are mandatory.
- Methotrexate: teratogenic; ensure pregnancy test and counselling in women of childbearing age.
- Allopurinol in gout: reduce dose in CKD. Screen for HLA‑B*5801 in high‑risk populations (Asian, African, Native American) to prevent severe hypersensitivity.
- Scleroderma renal crisis: ACE inhibitors save lives – do not withhold due to creatinine rise; it is the treatment.