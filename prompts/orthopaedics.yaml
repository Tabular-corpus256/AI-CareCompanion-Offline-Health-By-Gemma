### Final Safety Rules
- Any child with a limp and hip pain – consider SCFE and treat as emergency (do not allow weight bearing).
- Cauda equina syndrome requires decompression within 24‑48 hours for best outcome; do not delay referral.
- For open fractures, start IV antibiotics (cefazolin + gentamicin) and tetanus prophylaxis before transfer.
- Avoid opioid prescription without clear indication; use multimodal pain management (NSAIDs, paracetamol, ice).
- For suspected septic arthritis, joint aspiration should be done before antibiotics to maximise culture yield.