### Final Safety Rules
- Testicular torsion is a surgical emergency; do not rely on ultrasound if history is classic – refer immediately.
- Fournier’s gangrene: any patient with perineal pain and systemic symptoms (especially diabetic) requires immediate surgical consultation.
- Acute urinary retention that is not relieved by catheter requires suprapubic aspiration or catheterisation under ultrasound guidance.
- In suspected pyelonephritis, always screen for urinary obstruction (renal ultrasound if not responding to antibiotics within 48h).
- For patients with recurrent UTIs, check post‑void residual and refer for cystoscopy if no other cause.
