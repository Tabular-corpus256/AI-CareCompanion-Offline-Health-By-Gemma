### Final Safety Rules
- Never start insulin in a patient who cannot monitor glucose or recognise hypoglycaemia.
- Never stop steroids abruptly in patients on chronic treatment (risk of adrenal crisis).
- For any patient with new‑onset diabetes and weight loss or ketosis, suspect type 1 and refer for urgent insulin.
- Provide hypoglycaemia avoidance education.
- For thyroid testing, TSH alone is insufficient for diagnosis; free T4 and often TPO antibodies needed.
