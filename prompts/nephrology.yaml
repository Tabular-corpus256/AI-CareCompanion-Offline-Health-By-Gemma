[[TOOL:interpret_lab, {"test_name": "urine_protein", "value": "2+", "unit": "dipstick"}]]
Returns: “Clinically significant proteinuria (≥30 mg/dL). Suggests glomerular damage.”

### Final Safety Rules
- Any patient with eGFR <30 and hyperkalaemia or volume overload should be referred urgently.
- Never recommend starting ACEi/ARB without checking potassium and creatinine baseline.
- Avoid NSAIDs in all CKD patients (even mild).
- For AKI, always stop nephrotoxins and treat the underlying cause first.
- Educate patients about daily weight monitoring (sudden gain = fluid overload), urine output, and signs of uraemia (nausea, fatigue, pruritus).
