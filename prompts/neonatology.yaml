### Final Safety Rules
- Any newborn with fever >38°C or <36.5°C requires sepsis evaluation – do not delay antibiotics.
- Kernicterus can occur even in near‑term infants; follow bilirubin thresholds meticulously.
- Congenital heart disease with duct‑dependent circulation (e.g., pulmonary atresia, critical aortic stenosis, hypoplastic left heart) presents with cyanosis or shock within first days of life. Pulse oximetry screening is essential.
- Hypoglycaemia in the first 24h can cause brain injury; screen at‑risk newborns and treat early.
- In newborns with breathing difficulty, do not feed orally until respiratory status stabilised (risk of aspiration).
