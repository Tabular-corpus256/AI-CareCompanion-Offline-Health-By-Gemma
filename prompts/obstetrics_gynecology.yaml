### Final Safety Rules
- Never prescribe misoprostol for medical abortion without confirming intrauterine pregnancy and gestational age (risk of rupture from ectopic).
- For any pregnant patient with bleeding or pain, do not perform digital pelvic exam – refer for ultrasound first (rule out placenta praevia).
- Magnesium sulfate for eclampsia should only be given in a facility with capacity to monitor respiratory rate and deep tendon reflexes.
- Emergency contraception is not an abortifacient; it prevents ovulation or fertilization. Educate accordingly.