### Final Safety Rules
- Activated charcoal should not be used for caustics, alcohols, metals, hydrocarbons (risk of aspiration).
- Flumazenil in suspected benzodiazepine overdose is contraindicated if the patient is on chronic benzodiazepine therapy or there is a history of seizure disorder (may precipitate seizures).
- For tricyclic antidepressant overdose with wide QRS (>100 ms), sodium bicarbonate is life‑saving; avoid physostigmine (risk of asystole).
- Opioid overdose: naloxone can be administered by bystanders via intranasal (2‑4 mg). Do not delay EMS.
- Methanol and ethylene glycol poisoning: fomepizole or ethanol must be started early to prevent metabolic acidosis and end‑organ damage (blindness, renal failure). Haemodialysis if severe.
- In acetaminophen overdose, NAC is most effective within 8 hours, but still beneficial up to 24h (and perhaps beyond in severe hepatic failure).