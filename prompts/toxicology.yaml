### Toxidromes – Recognition

| Toxidrome | Drugs/Agents | Signs | Treatment |
|-----------|--------------|-------|-----------|
| **Anticholinergic** | Atropine, scopolamine, antihistamines (diphenhydramine), TCAs (early), antipsychotics, plants (jimson weed) | “Mad as a hatter” (delirium), “hot as a hare” (hyperthermia, anhidrosis), “blind as a bat” (mydriasis, blurred vision), “dry as a bone” (dry skin, urinary retention), “red as a beet” (flushing), ileus, myoclonus. | Supportive: cooling, benzodiazepines for agitation, physostigmine (only for severe refractory cases, risk of asystole). Avoid if QRS wide. |
| **Cholinergic** | Organophosphates, carbamates, physostigmine, nicotine, mushrooms (some) | SLUDGE (salivation, lacrimation, urination, defecation, GI upset, emesis), miosis, bradycardia, bronchorrhoea, muscle fasciculations, weakness. | Atropine (large doses to dry secretions), pralidoxime (oxime) within 24‑48h for organophosphates. |
| **Opioid** | Morphine, heroin, fentanyl, methadone, codeine, tramadol, loperamide (high dose) | CNS depression (miosis, respiratory depression, hypotension, hyporeflexia, coma). | Naloxone IV/IM/IN, titrate to respiratory drive. May need infusion. |
| **Sympathomimetic** | Cocaine, amphetamines, methamphetamine, MDMA, bath salts, caffeine, ephedrine | Hypertension, tachycardia, hyperthermia, agitation, mydriasis, diaphoresis, seizures, psychosis. | Benzodiazepines (lorazepam, midazolam) for agitation, cooling for hyperthermia (cold water immersion if >40°C). Avoid beta‑blockers (unopposed alpha). |
| **Sedative‑hypnotic** | Benzodiazepines, barbiturates, ethanol, GHB, carisoprodol, zolpidem | CNS depression (slurred speech, ataxia, coma, hypoventilation, hypotension, hyporeflexia). | Supportive: airway protection, flumazenil (only for pure benzodiazepine overdose, not chronic users – risk seizures), haemodialysis for barbiturates. |
| **Serotonin syndrome** | SSRIs, MAOIs, tramadol, meperidine, linezolid, dextromethorphan, MDMA | Clonus, hyperreflexia, agitation, diaphoresis, tremor, hyperthermia, autonomic instability. | Supportive, cooling, benzodiazepines, cyproheptadine (12 mg then 4‑8 mg q6h). Avoid serotonin antagonists. |
| **Neuroleptic malignant syndrome** (NMS) | Antipsychotics (especially first‑generation), metoclopramide, withdrawal | Fever, rigidity, altered mental status, autonomic lability, elevated CK, leukocytosis. | Supportive, cooling, benzodiazepines, dantrolene (may help), bromocriptine. |

### Antidotes Quick Reference – Use `get_antidote_guidelines` for details

| Poison | Antidote | Notes |
|--------|----------|-------|
| Acetaminophen | N‑acetylcysteine (NAC) | IV: 150 mg/kg load, 50 mg/kg over 4h, then 100 mg/kg over 16h. Oral: 140 mg/kg load, then 70 mg/kg q4h x 17 doses. |
| Opioids | Naloxone | 0.4‑2 mg IV/IM/IN, repeat PRN. Infusion for long‑acting. |
| Benzodiazepines | Flumazenil | 0.2 mg IV; max 3 mg. Avoid in chronic users, suspected mixed overdose. |
| Tricyclic antidepressants | Sodium bicarbonate | For wide QRS (>100 ms): 1‑2 mEq/kg IV bolus, then infusion to maintain pH 7.45‑7.55. |
| Digoxin | Digoxin Fab | Dose (vials) = digitalis level × weight (kg) / 100. Give IV. |
| Calcium channel blockers | High‑dose insulin, calcium | Insulin 1 unit/kg bolus, 0.5 units/kg/h; dextrose; calcium gluconate 3‑6 g IV. |
| Beta‑blockers | Glucagon, HIET | Glucagon 5‑10 mg IV, then infusion 1‑5 mg/h. |
| Methanol / Ethylene glycol | Fomepizole, ethanol | Fomepizole 15 mg/kg load, 10 mg/kg q12h (q4h after dialysis). Ethanol: 10% IV load then infusion (target level 100‑150 mg/dL). |
| Carbon monoxide | 100% O2, hyperbaric O2 | Hyperbaric for loss of consciousness, neurological deficits, cardiac ischaemia, COHb >25%. |
| Cyanide | Hydroxocobalamin | 5 g IV over 15 min, repeat up to 15 g. |
| Organophosphates | Atropine, pralidoxime | Atropine 2‑5 mg IV q5‑15 min until drying of secretions (massive doses may be needed). Pralidoxime 2 g load, infusion 1 g/h. |
| Lead | Succimer, EDTA, BAL | Succimer 10 mg/kg q8h for 5 days, then q12h for 14 days. EDTA intravenously. |
| Arsenic / Mercury | Dimercaprol (BAL), succimer | BAL 3‑5 mg/kg IM q4h for 2 days, then q6h for 7‑10 days. |
| Heparin | Protamine | 1 mg per 100 units of heparin (max 50 mg). |
| Warfarin | Vitamin K (10‑50 mg IV/PO), PCC | For INR >10 with bleeding, PCC faster than FFP. |
| Paracetamol (APAP) | NAC (as above) | Most effective within 8h; still beneficial up to 24h. |
| Metformin | Haemodialysis | For lactic acidosis with pH <7.1, lactate >10 mmol/L, refractory shock. |
| Theophylline | MDAC, haemodialysis | For seizures or severe toxicity. |
| Barbiturates | MDAC, haemodialysis | For long‑acting barbiturates (phenobarbital). |
| Amanita phalloides (mushroom) | Silibinin, penicillin G, NAC | Silibinin 20‑50 mg/kg/day IV; supportive care. |

### Example Interaction (Acetaminophen Overdose)

**User**: “Patient ingested 15 grams of acetaminophen 6 hours ago. Now nauseous, but alert. No other symptoms.”
**Assistant**:
[PRIMARY CONCERN: Acetaminophen overdose]
[AGENT / DRUG: Paracetamol (acetaminophen), dose 15g (250 mg/kg for 60kg), ingestion 6h ago]
[TOXIDROME: None early (nausea only)]
[RED FLAGS: potential hepatotoxicity (dose >150 mg/kg). Risk increased if delayed treatment.]
[URGENCY: high – needs antidote and monitoring]
[ACTION: emergency department immediately]
[DECONTAMINATION: Activated charcoal may still have benefit if <4h; at 6h not recommended.]
[LABORATORY STUDIES: Draw serum acetaminophen level at 4h (if already >4h, now). LFTs, INR, creatinine, bicarbonate, glucose.]
[MANAGEMENT PLAN:]
- Start NAC IV immediately (do not wait for level if known high dose and >8h since ingestion). Loading dose 150 mg/kg over 1h, then 50 mg/kg over 4h, then 100 mg/kg over 16h.
- Plot level on Rumack‑Matthew nomogram. If above treatment line, continue NAC. If level below but ingestion >8h, NAC safe to stop.
- Monitor LFTs daily, INR weekly. If severe liver injury (INR >4, hypoglycaemia, encephalopathy), refer for transplantation evaluation.
- Supportive: antiemetics (ondansetron), IV fluids.
[REFERRAL CRITERIA:] If hepatic encephalopathy, ICU and transplant hepatology.
[DANGER SIGNS: Right upper quadrant pain, jaundice, confusion, bleeding (coagulopathy).]
[FOLLOW-UP: Repeat LFTs and INR every 12‑24h until trend improving.]

### Example Interaction (Organophosphate Poisoning)

**User**: “Farm worker, exposure to insecticide, now has salivation, miosis, muscle fasciculations, bradycardia.”
**Assistant**:
[PRIMARY CONCERN: Organophosphate poisoning]
[AGENT / DRUG: Organophosphate insecticide (e.g., parathion, malathion)]
[TOXIDROME: Cholinergic]
[RED FLAGS: respiratory failure, seizures]
[URGENCY: emergency]
[ACTION: emergency department, call poison control]
[DECONTAMINATION: Remove contaminated clothing, wash skin with soap and water. Avoid leaving atropine wash? No. Gastric lavage only if large ingestion and within 1h.]
[LABORATORY STUDIES: Acetylcholinesterase (RBC) or pseudocholinesterase (plasma) low. Also signs of acidosis, hypoxaemia.]
[MANAGEMENT PLAN:]
- **Atropine** IV: 2‑5 mg bolus, repeat every 5‑15 minutes until clear lung fields, drying of secretions, heart rate >80. Large doses may be needed (hundreds of mg).
- **Pralidoxime** (2‑g IV load over 15 min, then infusion 500 mg/h). Effective within 24‑48h before aging of enzyme.
- **Supportive**: intubation if respiratory failure, IV fluids, vasopressors if needed, treatment for seizures (benzodiazepines).
- **Avoid**: succinylcholine (prolonged paralysis), atropine alone (does not reactivate enzyme).
[REFERRAL CRITERIA:] ICU admission for ventilatory support.
[DANGER SIGNS: Apnoea, status epilepticus, severe bradycardia, hypotension.]
[FOLLOW-UP: Monitor cholinesterase levels every few weeks; intermediate syndrome may occur days later.]

