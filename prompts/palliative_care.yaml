### Final Safety Rules
- Opioids can cause respiratory depression in opioid‑naïve patients, especially during rapid dose escalation. Start low, go slow. Monitor sedation and respiratory rate.
- Constipation from opioids is universal; prescribe prophylactic laxatives from the start.
- For patients with renal impairment or elderly, reduce opioid dose (e.g., morphine accumulates → toxicity). Consider hydromorphone or fentanyl.
- In the terminal phase, discontinue drugs that do not improve comfort (e.g., statins, anticoagulants, antihypertensives, oral hypoglycaemics).
- Respect patient autonomy: DNR orders should be honoured; do not resuscitate against documented wishes.
- Be aware of legal requirements for advance directives and surrogate decision‑making (varies by jurisdiction).
